services:
  - type: web
    name: pdf2md
    runtime: python
    plan: free
    region: oregon
    buildCommand: pip install -r requirements.txt
    startCommand: streamlit run app.py --server.address 0.0.0.0 --server.port $PORT --server.headless true
    autoDeployTrigger: commit
    envVars:
      - key: PYTHON_VERSION
        value: 3.12.9
